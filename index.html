<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="google-site-verification" content="oX697S00Lw1uLvv1RzCvP9XQeuuZc38Kf2B3avHDDFY" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTUAL CRACK V3 - Nature Warzone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; cursor: crosshair; }
        canvas { display: block; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid rgba(0, 255, 204, 0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #crosshair::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 2px; height: 2px; background: #0f0; transform: translate(-50%, -50%);
        }
        #esp-canvas {
            position: absolute; top: 0; left: 0;
            pointer-events: none; z-index: 5;
        }
        
        /* Modern Hack Menu Panel */
        #hack-panel {
            position: absolute; top: 20px; left: 20px;
            width: 280px; background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 12px; color: #e0e0e0;
            display: none; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 255, 204, 0.1);
            backdrop-filter: blur(10px); z-index: 100;
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(90deg, #00ffcc22, #0088ff22);
            padding: 12px 15px; border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-content { padding: 15px; }
        .cheat-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding: 8px; border-radius: 6px;
            transition: background 0.2s;
        }
        .cheat-item:hover { background: rgba(255, 255, 255, 0.05); }
        
        /* Custom Switch */
        .toggle {
            appearance: none; width: 42px; height: 22px;
            background: #333; border-radius: 20px; position: relative;
            cursor: pointer; outline: none; transition: 0.3s;
        }
        .toggle:checked { background: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        .toggle::before {
            content: ''; position: absolute; width: 18px; height: 18px;
            background: #fff; border-radius: 50%; top: 2px; left: 2px;
            transition: 0.3s;
        }
        .toggle:checked::before { left: 22px; }

        .game-status {
            position: absolute; bottom: 30px; left: 30px;
            color: white; pointer-events: none;
        }
        .hp-bar-ui {
            width: 200px; height: 10px; background: rgba(0,0,0,0.5);
            border: 1px solid #555; border-radius: 5px; overflow: hidden;
        }
        #player-hp-fill { width: 100%; height: 100%; background: #ff4444; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <canvas id="esp-canvas"></canvas>
    
    <!-- New Hack Panel -->
    <div id="hack-panel">
        <div class="panel-header">
            <span class="font-bold tracking-widest text-cyan-400">VIRTUAL CRACK V3</span>
            <span class="text-[10px] bg-cyan-900 px-2 py-0.5 rounded text-cyan-200">PREMIUM</span>
        </div>
        <div class="panel-content">
            <div class="cheat-item">
                <span class="text-sm">Aim (Head)</span>
                <input type="checkbox" class="toggle" onchange="toggleCheat('aimbot', this.checked)">
            </div>
            <div class="cheat-item">
                <span class="text-sm">Silent Aim</span>
                <input type="checkbox" class="toggle" onchange="toggleCheat('silent', this.checked)">
            </div>
            <div class="cheat-item">
                <span class="text-sm">ESP Box 3D</span>
                <input type="checkbox" class="toggle" onchange="toggleCheat('espbox', this.checked)">
            </div>
            <div class="cheat-item">
                <span class="text-sm">ESP lines</span>
                <input type="checkbox" class="toggle" onchange="toggleCheat('espline', this.checked)">
            </div>
            <div class="cheat-item">
                <span class="text-sm">Health Display</span>
                <input type="checkbox" class="toggle" onchange="toggleCheat('esphp', this.checked)">
            </div>

            <div class="mt-4 pt-4 border-t border-gray-800 text-[11px] text-gray-500">
                <div class="flex justify-between mb-1"><span>Menu Key</span> <span class="text-cyan-500">[H]</span></div>
                <div class="flex justify-between mb-1"><span>Shoot</span> <span class="text-cyan-500">[LMB]</span></div>
                <div class="flex justify-between"><span>Movement</span> <span class="text-cyan-500">WASD</span></div>
            </div>
        </div>
    </div>

    <!-- Player Stats -->
    <div class="game-status">
        <div class="mb-2">
            <span class="text-xs text-gray-400 uppercase tracking-tighter">Player Health</span>
            <div class="hp-bar-ui"><div id="player-hp-fill"></div></div>
        </div>
        <div class="text-3xl font-black italic">AMMO: <span id="ammo" class="text-cyan-400">30</span><span class="text-sm text-gray-500 ml-1">/ INF</span></div>
    </div>

    <script>
        let scene, camera, renderer, espCanvas, espCtx;
        let isLocked = false;
        let enemies = [];
        let worldObjects = [];
        let playerHP = 100;
        let lastShootTime = 0;
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let pitch = 0, yaw = 0;
        
        const cheats = {
            aimbot: false,
            silent: false,
            espbox: false,
            espline: false,
            esphp: false
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f15);
            scene.fog = new THREE.Fog(0x0a0f15, 20, 250);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            espCanvas = document.getElementById('esp-canvas');
            espCanvas.width = window.innerWidth;
            espCanvas.height = window.innerHeight;
            espCtx = espCanvas.getContext('2d');

            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 4);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // Terrain Generation
            const islandGeo = new THREE.PlaneGeometry(600, 600, 100, 100);
            islandGeo.rotateX(-Math.PI/2);
            const posAttr = islandGeo.attributes.position;
            for(let i=0; i<posAttr.count; i++) {
                let x = posAttr.getX(i);
                let z = posAttr.getZ(i);
                // Create hills and valleys
                let h = Math.sin(x/15) * 2 + Math.cos(z/15) * 2 + Math.sin(x/5) * 0.5;
                posAttr.setY(i, h);
            }
            islandGeo.computeVertexNormals();
            const islandMat = new THREE.MeshPhongMaterial({ color: 0x1a2e1a, flatShading: false });
            const island = new THREE.Mesh(islandGeo, islandMat);
            island.receiveShadow = true;
            scene.add(island);

            // Add Nature: Trees and Rocks
            for(let i=0; i<80; i++) {
                createNatureObject();
            }

            // Spawn Enemies
            for(let i=0; i<12; i++) {
                spawnEnemy();
            }

            // Events
            document.addEventListener('mousedown', (e) => {
                if(!isLocked) document.body.requestPointerLock();
                else if(e.button === 0) shoot();
            });

            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === document.body;
            });

            document.addEventListener('mousemove', (e) => {
                if(!isLocked) return;
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            });

            window.addEventListener('keydown', (e) => {
                const key = e.code;
                if(key === 'KeyW') moveForward = true;
                if(key === 'KeyS') moveBackward = true;
                if(key === 'KeyA') moveLeft = true;
                if(key === 'KeyD') moveRight = true;
                if(key === 'KeyH') {
                    const m = document.getElementById('hack-panel');
                    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
                    if(m.style.display === 'flex') document.exitPointerLock();
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.code;
                if(key === 'KeyW') moveForward = false;
                if(key === 'KeyS') moveBackward = false;
                if(key === 'KeyA') moveLeft = false;
                if(key === 'KeyD') moveRight = false;
            });

            animate();
        }

        function createNatureObject() {
            const x = (Math.random() - 0.5) * 450;
            const z = (Math.random() - 0.5) * 450;
            const type = Math.random();

            if(type > 0.4) { // Tree
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), new THREE.MeshPhongMaterial({color: 0x3d2b1f}));
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 8), new THREE.MeshPhongMaterial({color: 0x0a3d0a}));
                leaves.position.y = 2.5;
                const tree = new THREE.Group();
                tree.add(trunk); tree.add(leaves);
                tree.position.set(x, 1, z);
                scene.add(tree);
            } else { // Rock
                const rock = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(Math.random() * 2 + 1, 0),
                    new THREE.MeshPhongMaterial({color: 0x555555})
                );
                rock.position.set(x, 0, z);
                rock.scale.y = 0.5;
                scene.add(rock);
            }
        }

        function spawnEnemy() {
            const group = new THREE.Group();
            
            // Body - Tactical look
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.6), new THREE.MeshPhongMaterial({color: 0x222222}));
            body.position.y = 0.7;
            group.add(body);

            // Head - Bright color for ESP targeting
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), new THREE.MeshPhongMaterial({color: 0xffffff}));
            head.position.y = 1.65;
            head.name = "HEAD";
            group.add(head);

            group.position.set((Math.random()-0.5)*300, 0, (Math.random()-0.5)*300);
            group.userData = { 
                hp: 100, 
                maxHp: 100,
                lastFire: 0,
                velocity: new THREE.Vector3(),
                state: 'patrol' 
            };
            
            scene.add(group);
            enemies.push(group);
        }

        function shoot() {
            const now = Date.now();
            if(now - lastShootTime < 100) return; // Fire rate limit
            lastShootTime = now;

            let targetPos = null;
            let targetEnemy = null;

            if(cheats.silent) {
                let bestFov = 0.8; 
                enemies.forEach(en => {
                    if(en.userData.hp <= 0) return;
                    const headPos = new THREE.Vector3();
                    en.children[1].getWorldPosition(headPos);
                    
                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    const toEn = headPos.clone().sub(camera.position).normalize();
                    const dot = camDir.dot(toEn);
                    
                    if(dot > bestFov) {
                        bestFov = dot;
                        targetPos = headPos;
                        targetEnemy = en;
                    }
                });
            }

            if(!targetPos) {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                const hits = ray.intersectObjects(enemies, true);
                if(hits.length > 0) {
                    targetPos = hits[0].point;
                    let root = hits[0].object;
                    while(root.parent && !enemies.includes(root)) root = root.parent;
                    targetEnemy = root;
                } else {
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    targetPos = camera.position.clone().add(dir.multiplyScalar(200));
                }
            }

            // Visual Tracer
            const tracerGeo = new THREE.BufferGeometry().setFromPoints([
                camera.position.clone().add(new THREE.Vector3(0,-0.2,0)), 
                targetPos
            ]);
            const tracerMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
            const line = new THREE.Line(tracerGeo, tracerMat);
            scene.add(line);
            setTimeout(() => scene.remove(line), 60);

            if(targetEnemy) {
                targetEnemy.userData.hp -= 25;
                if(targetEnemy.userData.hp <= 0) {
                    targetEnemy.position.y = -10;
                    setTimeout(() => {
                        targetEnemy.position.set((Math.random()-0.5)*300, 0, (Math.random()-0.5)*300);
                        targetEnemy.position.y = 0;
                        targetEnemy.userData.hp = 100;
                    }, 5000);
                }
            }

            // Ammo UI
            const ammoEl = document.getElementById('ammo');
            let ammo = parseInt(ammoEl.innerText);
            ammoEl.innerText = ammo > 1 ? ammo - 1 : 30;
        }

        window.toggleCheat = function(id, val) {
            cheats[id] = val;
        }

        function drawESP() {
            espCtx.clearRect(0, 0, espCanvas.width, espCanvas.height);
            if(!cheats.espbox && !cheats.espline && !cheats.esphp) return;

            enemies.forEach(en => {
                if(en.userData.hp <= 0) return;

                const headPos = new THREE.Vector3();
                en.children[1].getWorldPosition(headPos);
                const pos = headPos.clone().project(camera);

                if(pos.z < 1) {
                    const x = (pos.x + 1) / 2 * window.innerWidth;
                    const y = -(pos.y - 1) / 2 * window.innerHeight;
                    const dist = headPos.distanceTo(camera.position);

                    if(cheats.espline) {
                        espCtx.beginPath();
                        espCtx.moveTo(window.innerWidth/2, window.innerHeight);
                        espCtx.lineTo(x, y);
                        espCtx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
                        espCtx.stroke();
                    }

                    if(cheats.espbox) {
                        const h = 4000 / dist;
                        const w = h * 0.5;
                        espCtx.strokeStyle = '#00ffcc';
                        espCtx.lineWidth = 1.5;
                        espCtx.strokeRect(x - w/2, y - h/10, w, h);
                    }

                    if(cheats.esphp) {
                        const barW = 50;
                        espCtx.fillStyle = 'rgba(0,0,0,0.5)';
                        espCtx.fillRect(x - barW/2, y - 25, barW, 4);
                        espCtx.fillStyle = '#00ff00';
                        espCtx.fillRect(x - barW/2, y - 25, barW * (en.userData.hp/100), 4);
                    }
                }
            });
        }

        function updateAimbot() {
            if(!cheats.aimbot || !isLocked) return;

            let closest = null;
            let bestDot = 0.8; 

            enemies.forEach(en => {
                if(en.userData.hp <= 0) return;
                const headPos = new THREE.Vector3();
                en.children[1].getWorldPosition(headPos);
                
                const toEn = headPos.clone().sub(camera.position).normalize();
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                const dot = camDir.dot(toEn);

                if(dot > bestDot) {
                    bestDot = dot;
                    closest = headPos;
                }
            });

            if(closest) {
                const targetDir = closest.clone().sub(camera.position).normalize();
                const targetYaw = Math.atan2(-targetDir.x, -targetDir.z);
                const targetPitch = Math.asin(targetDir.y);

                yaw += (targetYaw - yaw) * 0.15;
                pitch += (targetPitch - pitch) * 0.15;
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        }

        function updateEnemies() {
            const now = Date.now();
            enemies.forEach(en => {
                if(en.userData.hp <= 0) return;

                const dist = en.position.distanceTo(camera.position);

                // AI Logic: Aggressive if close
                if(dist < 50) {
                    en.lookAt(camera.position.x, 0, camera.position.z);
                    const moveDir = camera.position.clone().sub(en.position).normalize();
                    en.position.add(moveDir.multiplyScalar(0.06));

                    // Enemy shooting player
                    if(now - en.userData.lastFire > 1500 && dist < 40) {
                        en.userData.lastFire = now;
                        playerHP -= 5;
                        updatePlayerUI();
                        
                        // Visual enemy fire
                        const bulletGeo = new THREE.BufferGeometry().setFromPoints([en.position.clone().add(new THREE.Vector3(0,1.5,0)), camera.position]);
                        const bulletMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
                        const l = new THREE.Line(bulletGeo, bulletMat);
                        scene.add(l);
                        setTimeout(() => scene.remove(l), 50);
                    }
                } else {
                    // Idle movement
                    en.position.x += Math.sin(now*0.0005 + en.id) * 0.02;
                    en.position.z += Math.cos(now*0.0005 + en.id) * 0.02;
                }
            });

            if(playerHP <= 0) {
                playerHP = 100;
                camera.position.set(0, 1.7, 0);
                updatePlayerUI();
            }
        }

        function updatePlayerUI() {
            document.getElementById('player-hp-fill').style.width = playerHP + '%';
        }

        function animate() {
            requestAnimationFrame(animate);

            if(isLocked) {
                const speed = 0.2;
                if(moveForward) camera.translateZ(-speed);
                if(moveBackward) camera.translateZ(speed);
                if(moveLeft) camera.translateX(-speed);
                if(moveRight) camera.translateX(speed);
                camera.position.y = 1.8; 
            }

            updateEnemies();
            updateAimbot();
            drawESP();
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            espCanvas.width = window.innerWidth;
            espCanvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
